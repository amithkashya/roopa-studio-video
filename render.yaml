services:
  - type: web
    name: roopa-studio-video
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        sync: false
      - key: BOOKING_TO_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: roopa-studio-video-db
          property: connectionString

databases:
  - name: roopa-studio-video-db
    plan: free
